                - heading "What is Spaces" [level=2] [ref=e606]
                - paragraph [ref=e607]: Spaces is an infinite canvas where you design and run multi-step creative workflows using AI tools. Each step in your workflow is a node — a block that does one specific thing, like generating an image, writing a prompt, creating a voiceover, or upscaling a video. You connect nodes to define how data moves from one step to the next.
                - paragraph [ref=e608]: The result is a workflow you can see, reuse, and share. Instead of recreating the same process from scratch each time, you build it once and run it again whenever you need it — adjusting only what changes.
                - paragraph [ref=e609]: Spaces is built for two types of users. Power creators — designers, art directors, brand teams — who want precise control, repeatability, and collaboration across complex workflows. And anyone who wants fast results through ready-made templates, with no setup required.
