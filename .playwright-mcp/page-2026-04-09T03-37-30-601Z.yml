                - generic [ref=e579]:
                  - heading "Spaces" [level=1] [ref=e580]
                  - paragraph [ref=e581]: Build visual AI workflows, automate creative processes, and collaborate in real time — all on an infinite canvas.
                - paragraph [ref=e582]:
                  - link "Spaces" [ref=e583] [cursor=pointer]:
                    - /url: https://www.freepik.com/pikaso/spaces
                  - text: is a canvas-based environment where you connect AI tools visually to build, automate, and share creative workflows. Instead of switching between tools for each step, you wire everything together in one place — generation, editing, audio, and collaboration — and run it as many times as you need.
                  - text: Think of it as a creative playground where AI tools work together, and you're the director.
