                - heading "What you can build" [level=2] [ref=e690]
                - paragraph [ref=e691]: "Spaces is flexible enough to handle simple one-step tasks and intricate multi-branch pipelines. Here are some ideas to get you started:"
                - heading "Text-to-image pipeline with upscaling" [level=3] [ref=e692]
                - paragraph [ref=e693]: Write a prompt, generate an image with AI, then automatically upscale the result to print-ready resolution — all in three connected nodes.
                - heading "Video generation with voiceover and music" [level=3] [ref=e694]
                - paragraph [ref=e695]: Generate a video from a text description, pipe it into a voiceover node to add narration, then layer in background music. Export a complete video without leaving the canvas.
                - heading "Batch processing with lists" [level=3] [ref=e696]
                - paragraph [ref=e697]: Need 20 variations of the same concept? Use a List node to feed multiple prompts into a single image generation node. Spaces processes each one and collects the results, no manual repetition.
                - heading "Multi-page designs with Designer" [level=3] [ref=e698]
                - paragraph [ref=e699]: Open the Designer node — a full graphic design editor embedded right inside Spaces. Create multi-page layouts, then feed individual pages into other nodes for further processing, animation, or export.
                - heading "Custom reusable workflow apps" [level=3] [ref=e700]
                - paragraph [ref=e701]: Once you have built a workflow you love, save it as a Workflow App. It becomes a single, reusable block with its own inputs and outputs — like building your own custom AI tool that you or your team can use again and again.
