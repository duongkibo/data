                - heading "Templates" [level=2] [ref=e796]
                - paragraph [ref=e797]: Templates are pre-built workflows that compress multi-step creative processes into a few clicks. They cover common use cases — product visuals, social content, character animation, and more — and are ready to run or customize.
                - paragraph [ref=e798]: You can browse templates from the Spaces home screen. Each template can be opened, edited, and saved as your own space. Templates are also a good way to learn how nodes and connections work together in practice.
