              - article [ref=e577]:
                - generic [ref=e579]:
                  - heading "Utility nodes" [level=1] [ref=e580]
                  - paragraph [ref=e581]: Keep your canvas organized and supercharge your workflows with batch processing.
                - paragraph [ref=e582]:
                  - text: Utility nodes come in two flavors.
                  - strong [ref=e583]: Organizational nodes
                  - text: help you annotate and structure your canvas visually.
                  - strong [ref=e584]: Functional nodes
                  - text: actively participate in your workflow. The List node in particular is one of the most powerful tools in Spaces.
                - heading "In this article" [level=2] [ref=e585]
                - list [ref=e586]:
                  - listitem [ref=e587]:
                    - link "List" [ref=e588] [cursor=pointer]:
                      - /url: https://www.freepik.com/ai/docs/utility-nodes#list
                  - listitem [ref=e589]:
                    - link "Group" [ref=e590] [cursor=pointer]:
                      - /url: https://www.freepik.com/ai/docs/utility-nodes#group
                  - listitem [ref=e591]:
                    - link "Sticky note" [ref=e592] [cursor=pointer]:
                      - /url: https://www.freepik.com/ai/docs/utility-nodes#sticky-note
                  - listitem [ref=e593]:
                    - link "Stickers" [ref=e594] [cursor=pointer]:
                      - /url: https://www.freepik.com/ai/docs/utility-nodes#stickers
                  - listitem [ref=e595]:
                    - link "Tips and best practices" [ref=e596] [cursor=pointer]:
                      - /url: https://www.freepik.com/ai/docs/utility-nodes#tips-best-practices
                - heading "List" [level=2] [ref=e597]
                - paragraph [ref=e598]: The List node aggregates multiple items for batch processing. Fill it with prompts, images, videos, or audio, connect it to a generator, and every single item gets processed automatically. It is the easiest way to go from "one at a time" to "ten in one click."
                - generic [ref=e599]:
                  - img [ref=e600]
                  - generic [ref=e604]: This node is being rolled out gradually and may not be available in your account yet.
                - heading "How to use it" [level=3] [ref=e605]
                - generic [ref=e606]:
                  - generic [ref=e607]:
                    - generic [ref=e610]: "1"
                    - generic [ref=e612]:
                      - paragraph [ref=e613]: Add the node
                      - paragraph [ref=e614]: Search for List in Spotlight.
                  - generic [ref=e615]:
                    - generic [ref=e618]: "2"
                    - generic [ref=e620]:
                      - paragraph [ref=e621]: Choose the item type
                      - paragraph [ref=e622]: "Select what kind of items this List holds: text, image, video, or audio. A List holds one type at a time."
                  - generic [ref=e623]:
                    - generic [ref=e626]: "3"
                    - generic [ref=e628]:
                      - paragraph [ref=e629]: Populate the list
                      - paragraph [ref=e630]: Type items in manually using the Add button, or connect upstream nodes. A Text node's content automatically becomes a list item. An Upload feeds its file in.
                  - generic [ref=e631]:
                    - generic [ref=e634]: "4"
                    - generic [ref=e636]:
                      - paragraph [ref=e637]: Connect the output
                      - paragraph [ref=e638]: Wire the List's output port into a generator node (Image Generator, Video Generator, Voiceover, etc.).
                  - generic [ref=e639]:
                    - generic [ref=e642]: "5"
                    - generic [ref=e643]:
                      - paragraph [ref=e644]: Run the workflow
                      - paragraph [ref=e645]: The generator processes each checked item in the List, one by one. Results accumulate on the downstream node.
                - heading "Settings" [level=3] [ref=e646]
                - table [ref=e648]:
                  - rowgroup [ref=e649]:
                    - row "Setting What it does" [ref=e650]:
                      - columnheader "Setting" [ref=e651]
                      - columnheader "What it does" [ref=e652]
                  - rowgroup [ref=e653]:
                    - 'row "Item type What kind of items this List holds: text, image, video, or audio." [ref=e654]':
                      - cell "Item type" [ref=e655]
                      - 'cell "What kind of items this List holds: text, image, video, or audio." [ref=e656]'
