                    - row "View mode Grid (ideal for images and videos) or List (better for text and audio)." [ref=e663]:
                      - cell "View mode" [ref=e664]
                      - cell "Grid (ideal for images and videos) or List (better for text and audio)." [ref=e665]
                - heading "Working with the list" [level=3] [ref=e666]
                - paragraph [ref=e667]:
                  - text: The List card is fully interactive. Click an item to edit its text directly. Use
                  - strong [ref=e668]: checkboxes
                  - text: to include or exclude items from processing without deleting them. Drag items to reorder (the processing order matches the list order). Hit the Add button to create new items manually.
                - heading "Good to know" [level=3] [ref=e669]
                - paragraph [ref=e670]: Lists can also receive items from other Lists, allowing you to chain them for complex multi-stage batch workflows. For example, a List of prompts can feed an Image Generator, and the resulting images can flow into a second List that feeds an Upscaler.
                - heading "Input and output" [level=3] [ref=e671]
                - paragraph [ref=e672]: The List node accepts input from multiple upstream nodes (text, images, videos, or audio) and passes items downstream through matching output ports. It can also receive items from other Lists, which lets you chain them together for multi-stage batch workflows.
                - heading "Use cases" [level=3] [ref=e673]
                - list [ref=e674]:
                  - listitem [ref=e675]:
                    - strong [ref=e676]: Batch prompts.
                    - text: Create a List of 10 different prompts, connect it to an Image Generator, and get 10 unique images in a single run.
                  - listitem [ref=e677]:
                    - strong [ref=e678]: A/B testing.
                    - text: Write several variations of a prompt, generate results for each, and compare them side by side.
                  - listitem [ref=e679]:
                    - strong [ref=e680]: Video storyboard.
                    - text: Fill a List with scene descriptions, connect to a Video Generator for each scene, then pipe everything into a Video Combiner for the final cut.
                  - listitem [ref=e681]:
                    - strong [ref=e682]: Multi-voice narration.
                    - text: Add script segments to a List, connect to a Voiceover node with different voice settings, and generate a full narration with varied speakers.
                - heading "Group" [level=2] [ref=e683]
                - paragraph [ref=e684]: Groups let you visually organize related nodes into labeled, color-coded containers. Drag nodes into a Group to bundle them. When you move the Group, all its children move with it.
                - paragraph [ref=e685]:
                  - text: Groups are not just cosmetic. They also expose
                  - strong [ref=e686]: dynamic output ports
                  - text: based on their contents. If a Group contains an Image Generator, it gets an Image output port. If it contains a Video Generator, it gets a Video output port. Ports update in real time as you add or remove nodes.
                - heading "How to use it" [level=3] [ref=e687]
                - generic [ref=e688]:
                  - generic [ref=e689]:
                    - generic [ref=e692]: "1"
                    - generic [ref=e694]:
                      - paragraph [ref=e695]: Add a Group
                      - paragraph [ref=e696]: Search for Group in Spotlight.
                  - generic [ref=e697]:
                    - generic [ref=e700]: "2"
                    - generic [ref=e702]:
                      - paragraph [ref=e703]: Drag nodes into the Group
                      - paragraph [ref=e704]: They become children of that container. The Group renders a colored background with a label around them.
                  - generic [ref=e705]:
                    - generic [ref=e708]: "3"
                    - generic [ref=e710]:
                      - paragraph [ref=e711]: Customize
                      - paragraph [ref=e712]: Set a title, choose a background gradient, and pick an accent color for the border and label.
                  - generic [ref=e713]:
                    - generic [ref=e716]: "4"
                    - generic [ref=e717]:
                      - paragraph [ref=e718]: Connect the Group's output
                      - paragraph [ref=e719]: Wire the Group's output ports to downstream nodes. No need to connect each child individually.
                - paragraph [ref=e720]: "When a Group has multiple internal nodes, the ports on the Group boundary follow a priority order: Image ports appear first, then Video, then Text, then Audio."
                - heading "Use cases" [level=3] [ref=e721]
                - list [ref=e722]:
                  - listitem [ref=e723]:
                    - strong [ref=e724]: Organize complex workflows.
                    - text: Bundle related nodes together. For example, a Character Design group containing a Text node, an Image Generator, and an Upscaler. One glance tells you what that section does.
                  - listitem [ref=e725]:
                    - strong [ref=e726]: Create reusable sections.
                    - text: Group a mini-workflow and connect its output port to different downstream processes. The Group becomes a self-contained building block.
                  - listitem [ref=e727]:
                    - strong [ref=e728]: Visual clarity.
                    - text: "Color-code Groups to distinguish different parts of your workflow: blue for inputs, green for generation, orange for post-processing."
                - heading "Sticky note" [level=2] [ref=e729]
                - paragraph [ref=e730]: Sticky notes are visual annotations for your canvas. Use them to add comments, reminders, or explanations anywhere in your workflow. They do not participate in execution and do not connect to other nodes.
                - paragraph [ref=e731]: Add a Sticky note from Spotlight, type your content, and choose a color (yellow, blue, green, pink, purple, or orange) and font size (Small, Medium, or Large). The author's name appears at the bottom automatically.
                - heading "Use cases" [level=3] [ref=e732]
                - list [ref=e733]:
                  - listitem [ref=e734]:
                    - strong [ref=e735]: Label sections.
                    - text: Drop a note next to a cluster of nodes to explain what that part of the workflow does. Future-you will be grateful.
                  - listitem [ref=e736]:
                    - strong [ref=e737]: Leave notes for collaborators.
                    - text: Working in a shared Space? Sticky Notes are perfect for async communication. Leave review requests, approvals, or instructions.
                  - listitem [ref=e738]:
                    - strong [ref=e739]: Document your process.
                    - text: Capture the reasoning behind a particular setup while it is still fresh. Your canvas becomes a living design journal.
                - heading "Stickers" [level=2] [ref=e740]
                - paragraph [ref=e741]: Stickers place emoji directly on your canvas. A quick, visual way to mark, highlight, or flag nodes without writing anything.
                - list [ref=e742]:
                  - listitem [ref=e743]: Drop a star on nodes or outputs you want to come back to.
                  - listitem [ref=e744]: Place a warning emoji next to anything that needs attention.
                  - listitem [ref=e745]: Use them as quick visual markers when all you need is a simple flag.
                - heading "Tips and best practices" [level=2] [ref=e746]
                - paragraph [ref=e747]:
                  - strong [ref=e748]: Use checkboxes in Lists to iterate quickly.
                  - text: Include or exclude items without deleting them. This is handy for testing a subset of prompts before running the full batch.
                - paragraph [ref=e749]:
                  - strong [ref=e750]: Drag to reorder List items.
                  - text: The processing order matches the list order, so sequence matters when you are building storyboards or multi-step content.
                - paragraph [ref=e751]:
                  - strong [ref=e752]: Switch to grid view for image Lists.
                  - text: Thumbnails make reviewing much faster than file names.
                - paragraph [ref=e753]:
                  - strong [ref=e754]: Accumulate mode collects from multiple sources.
                  - text: When several upstream nodes feed into one List, everything collects in one place. Useful for gathering outputs from different parts of your workflow.
                - paragraph [ref=e755]:
                  - strong [ref=e756]: Groups auto-label based on their content.
                  - text: But you can always rename them for clarity, especially when collaborating.
                - paragraph [ref=e757]:
                  - strong [ref=e758]: Color-code Sticky notes by purpose.
                  - text: Yellow for ideas, red for issues, green for approved sections. It keeps the canvas scannable.
                - paragraph [ref=e759]:
                  - strong [ref=e760]: Use Sticky notes instead of comments for persistent context.
                  - text: Comments can be resolved and hidden. Sticky Notes stay visible on the canvas, making them better for instructions or explanations that should always be there.
